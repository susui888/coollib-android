name: Android CI/CD

# Control when the workflows will run
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository so the workflows can access it
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Java Environment (Imperial projects usually use JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin' # High-performance OpenJDK
          cache: 'gradle'        # Caching dependencies speeds up future builds

      # Step 3: Grant execute permission for the Gradle wrapper
      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # Step 4: Run Unit Tests (JVM Tests)
      # This validates your Clean Architecture logic and ViewModels
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      # Step 5: Run Android Lint (Static Code Analysis)
      # This checks for potential bugs and performance issues
      - name: Static Code Analysis (Lint)
        run: ./gradlew lintDebug

      # Step 6: Build Debug APK
      # Ensures the project compiles correctly and generates a shareable file
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # Step 7: Upload Build Artifacts (Optional)
      # This allows you to download the APK directly from the GitHub Actions tab
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-binary
          path: app/build/outputs/apk/debug/app-debug.apk